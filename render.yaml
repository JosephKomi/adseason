databases:
  - name: adseason-db
    plan: free
    databaseName: adseason
    user: adseason

services:
  - type: web
    name: adseason-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: adseason-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        value: https://adseason.vercel.app
      - key: MAX_FILE_SIZE_MB
        value: "50"
      - key: UPLOAD_DIR
        value: uploads
