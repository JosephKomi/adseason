services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: adseason
      POSTGRES_USER: adseason
      POSTGRES_PASSWORD: adseason
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adseason"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
